name: Build and Release Android APK

on:
  release:
    types: [created]
  # Alternatively, trigger on tag push:
  # push:
  #   tags:
  #     - 'v*'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./grama-vaxi-app/gradlew

      - name: Build with Gradle
        working-directory: ./grama-vaxi-app
        run: ./gradlew assembleRelease

      # If you have a signing configuration set up in your build.gradle,
      # the above command will produce an app-release.apk.
      # Otherwise, it may produce an unsigned APK (app-release-unsigned.apk).
      - name: Upload APK to Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: grama-vaxi-app/app/build/outputs/apk/release/app-release*.apk
          file_glob: true
          tag: ${{ github.ref }}
          overwrite: true
          asset_name: GramaVaxi.apk
